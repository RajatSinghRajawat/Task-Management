user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Redirect all HTTP traffic (Port 80) to HTTPS (Port 443)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Admin Panel Subdomain
    server {
        listen 443 ssl;
        server_name admin.tipsgalwar.com; # Replace with your actual domain

        # SSL Certificates (Mounted from host system's Let's Encrypt directory)
        ssl_certificate /etc/letsencrypt/live/tipsgalwar.com/fullchain.pem; # Replace tipsgalwar.com with your domain folder name
        ssl_certificate_key /etc/letsencrypt/live/tipsgalwar.com/privkey.pem; # Replace tipsgalwar.com with your domain folder name

        location / {
            proxy_pass http://admin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Students Panel Subdomain
    server {
        listen 443 ssl;
        server_name students.tipsgalwar.com; # Replace with your actual domain

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/tipsgalwar.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tipsgalwar.com/privkey.pem;

        location / {
            proxy_pass http://students:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Teachers Panel Subdomain
    server {
        listen 443 ssl;
        server_name teachers.tipsgalwar.com; # Replace with your actual domain

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/tipsgalwar.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tipsgalwar.com/privkey.pem;

        location / {
            proxy_pass http://teachers:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Backend API Subdomain
    server {
        listen 443 ssl;
        server_name api.tipsgalwar.com; # Replace with your actual domain

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/tipsgalwar.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tipsgalwar.com/privkey.pem;

        location / {
            proxy_pass http://backend:7001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets and connection persistence
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
