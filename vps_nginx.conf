# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    server_name admintask.tipsgalwar.in students.tipsgalwar.in teachers.tipsgalwar.in api.tipsgalwar.in;
    return 301 https://$host$request_uri;
}

# Admin Panel Subdomain Proxy
server {
    listen 443 ssl;
    server_name admintask.tipsgalwar.in;

    ssl_certificate /etc/letsencrypt/live/admintask.tipsgalwar.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admintask.tipsgalwar.in/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5182;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Students Panel Subdomain Proxy
server {
    listen 443 ssl;
