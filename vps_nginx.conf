# Teachers Panel Subdomain Proxy
server {
    listen 443 ssl;
    server_name teachers.tipsgalwar.in;

    ssl_certificate /etc/letsencrypt/live/admintask.tipsgalwar.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admintask.tipsgalwar.in/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5181;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API Subdomain Proxy
server {
    listen 443 ssl;
    server_name api.tipsgalwar.in;

    ssl_certificate /etc/letsencrypt/live/admintask.tipsgalwar.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admintask.tipsgalwar.in/privkey.pem;

    location / {
        # Note: If port 7001 is already in use, change this to 7002
        proxy_pass http://127.0.0.1:5183; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
